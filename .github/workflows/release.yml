name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: forge ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            asset: gothica-darwin-arm64
            exe: gothica
          - os: macos-13
            asset: gothica-darwin-amd64
            exe: gothica
          - os: ubuntu-latest
            asset: gothica-linux-amd64
            exe: gothica
          - os: windows-latest
            asset: gothica-windows-amd64.exe
            exe: gothica.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Forge binary
        working-directory: vox-gothica
        shell: bash
        run: |
          pip install pyinstaller -e .
          pyinstaller --onefile --name gothica --collect-submodules gothica \
            --distpath dist --workpath build/pyi --specpath build/pyi gothica_entry.py
          "./dist/${{ matrix.exe }}" versio
          "./dist/${{ matrix.exe }}" invoco exempla/salutatio.vg --silens

      - name: Stage release asset
        working-directory: vox-gothica/dist
        shell: bash
        run: |
          cp "${{ matrix.exe }}" "${{ matrix.asset }}"
          sha256sum "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            vox-gothica/dist/${{ matrix.asset }}
            vox-gothica/dist/${{ matrix.asset }}.sha256

  release:
    name: publish consecrated binaries
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Build checksum manifest
        run: |
          cat artifacts/*.sha256 > SHA256SUMS.txt
          ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/gothica-darwin-arm64
            artifacts/gothica-darwin-arm64.sha256
            artifacts/gothica-darwin-amd64
            artifacts/gothica-darwin-amd64.sha256
            artifacts/gothica-linux-amd64
            artifacts/gothica-linux-amd64.sha256
            artifacts/gothica-windows-amd64.exe
            artifacts/gothica-windows-amd64.exe.sha256
            SHA256SUMS.txt
          body: |
            ## Install (no Python required)

            **macOS / Linux:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/adeptusprogus/vox-gothica/main/vox-gothica/install.sh | bash
            ```

            **Windows (PowerShell):**
            ```powershell
            irm https://raw.githubusercontent.com/adeptusprogus/vox-gothica/main/vox-gothica/install.ps1 | iex
            ```

            Or download the binary for your platform below and put it on your `PATH`.

            | Asset | Platform |
            |-------|----------|
            | `gothica-darwin-arm64` | macOS Apple Silicon |
            | `gothica-darwin-amd64` | macOS Intel |
            | `gothica-linux-amd64` | Linux x86_64 |
            | `gothica-windows-amd64.exe` | Windows x86_64 |

            Verify: `gothica versio` · Run: `gothica invoco salutatio.vg`

            *The flesh is weak; the binary is self-contained.*
